worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  server_tokens off;

  upstream backend_upstream {
    server backend:4000;
  }

  upstream pwa_upstream {
    server pwa:80;
  }

  upstream web_admin_upstream {
    server web-admin:80;
  }

  upstream web_trace_upstream {
    server web-trace:80;
  }

  server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    location = /healthz {
      add_header Content-Type text/plain;
      return 200 'ok';
    }

    location /api/ {
      proxy_pass http://backend_upstream/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api {
      return 301 /api/;
    }

    location /admin/ {
      proxy_pass http://web_admin_upstream/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /admin {
      return 301 /admin/;
    }

    location /trace/ {
      proxy_pass http://web_trace_upstream/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /trace {
      return 301 /trace/;
    }

    location / {
      proxy_pass http://pwa_upstream/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
