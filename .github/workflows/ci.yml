name: ci

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  backend-and-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Backend tests
        run: npm --workspace backend run test

      - name: Backend build
        run: npm --workspace backend run build

      - name: PWA tests
        run: npm --workspace pwa run test

      - name: PWA build
        run: npm --workspace pwa run build

      - name: Web admin tests
        run: npm --workspace web-admin run test

      - name: Web admin build
        run: npm --workspace web-admin run build

      - name: Web trace tests
        run: npm --workspace web-trace run test

      - name: Web trace build
        run: npm --workspace web-trace run build

  mobile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Mobile tests
        run: npm --workspace mobile run test

      - name: Mobile typecheck
        run: npm --workspace mobile run typecheck

      - name: Mobile build validation
        run: npm --workspace mobile run build

  deploy-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose config
        run: docker compose --env-file deploy/env/.env.example -f deploy/docker-compose.yml config

      - name: Check backup script syntax
        run: bash -n deploy/scripts/backup.sh

      - name: Check restore script syntax
        run: bash -n deploy/scripts/restore.sh
